<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Savana Adventrip</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Layout Overrides khusus untuk halaman Login center-screen */
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--savana-light-bg);
      }
      .login-box {
        width: 100%;
        max-width: 400px;
        margin: 20px;
      }
      .login-header {
        text-align: center;
        margin-bottom: 20px;
      }
      .login-header img {
        max-width: 200px;
        height: auto;
        margin-bottom: 10px;
      }
      .error-box {
        background-color: #fce8e6;
        border: 1px solid #a83232;
        color: #a83232;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 0.9em;
        text-align: center;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container login-box">
      <div class="login-header">
        <img src="savana_logo.png" alt="Savana Adventrip Logo" />
        <h1
          style="
            font-size: 1.5em;
            color: var(--savana-dark-grey);
            font-weight: 600;
            margin: 0;
          "
        >
          Sistem Nota Otomatis
        </h1>
      </div>

      <div id="errorMessage" class="error-box">
        Username atau Password salah!
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username Admin:</label>
          <input
            type="text"
            id="username"
            placeholder="Masukkan username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input
            type="password"
            id="password"
            placeholder="Masukkan password"
            required
          />
        </div>
        <button type="submit" class="button-primary">Masuk Aplikasi</button>
      </form>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;
          const errorBox = document.getElementById("errorMessage");

          // Kredensial Login Admin Savana Adventrip
          const ADMIN_USERNAME = "adminsavana";
          const ADMIN_PASSWORD = "savanamalang2024";

          if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
            sessionStorage.setItem("savana_admin_logged", "true");
            window.location.href = "index.html";
          } else {
            errorBox.style.display = "block";
            document.getElementById("password").value = ""; // Bersihkan kolom password
          }
        });
    </script>
  </body>
</html>
